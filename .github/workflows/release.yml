name: Release

# Optional: on a version tag, attach a zip of the integration to a GitHub release.
# HACS installs directly from the repo tree, so this is a convenience, not a requirement.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches manifest version
        run: |
          version=$(python3 -c "import json; print(json.load(open('custom_components/device_dashboard/manifest.json'))['version'])")
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match manifest version v$version"
            exit 1
          fi
      - name: Zip integration
        run: |
          cd custom_components
          zip -r device_dashboard.zip device_dashboard -x '*/__pycache__/*'
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: custom_components/device_dashboard.zip
