name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # 'brands' requires adding the domain to home-assistant/brands, which is part of
          # HACS default-listing — not needed for custom-repository installs. Skip it so CI
          # reflects custom-repo readiness. Remove this if you later submit to HACS default.
          ignore: brands
